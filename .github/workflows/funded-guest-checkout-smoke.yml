name: Funded Guest Checkout Smoke

on:
  workflow_dispatch:
    inputs:
      confirm_fixture_preflight:
        description: Validate the protected funded fixture without spending
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: funded-guest-checkout-smoke
  cancel-in-progress: false

jobs:
  provider-preflight:
    if: inputs.confirm_fixture_preflight == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VITE_LIGHTNING_NETWORK: mainnet
      ANON_ZAP_CANARY_BASE_URL: ${{ vars.ANON_ZAP_CANARY_BASE_URL }}
      ANON_ZAP_CANARY_MERCHANT_PUBKEY: ${{ vars.ANON_ZAP_CANARY_MERCHANT_PUBKEY }}
      ANON_ZAP_CANARY_PRODUCT_ADDRESS: ${{ vars.ANON_ZAP_CANARY_PRODUCT_ADDRESS }}
      ANON_ZAP_CANARY_SIGNER_PUBKEY: ${{ vars.ANON_ZAP_CANARY_SIGNER_PUBKEY }}
      ANON_ZAP_CANARY_EXPECTED_LNURL: ${{ vars.ANON_ZAP_CANARY_EXPECTED_LNURL }}
      ANON_ZAP_CANARY_ATTESTATION_PUBLIC_KEYS: ${{ vars.ANON_ZAP_CANARY_ATTESTATION_PUBLIC_KEYS }}
      ANON_ZAP_PROVIDER_CANARY_LUD16: ${{ vars.ANON_ZAP_PROVIDER_CANARY_LUD16 }}
      ANON_ZAP_PROVIDER_CANARY_EXPECTED_HOST: ${{ vars.ANON_ZAP_PROVIDER_CANARY_EXPECTED_HOST }}
      ANON_ZAP_PROVIDER_CANARY_REQUEST_INVOICE: "false"
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Verify deployed signer and provider metadata
        run: bun run smoke:anon-zap-provider

  protected-fixture-preflight:
    if: inputs.confirm_fixture_preflight == true
    needs: [provider-preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: funded-commerce-smoke
    env:
      FUNDED_GUEST_SMOKE_BASE_URL: ${{ vars.FUNDED_GUEST_SMOKE_BASE_URL }}
      FUNDED_GUEST_SMOKE_MERCHANT_PUBKEY: ${{ vars.FUNDED_GUEST_SMOKE_MERCHANT_PUBKEY }}
      FUNDED_GUEST_SMOKE_MERCHANT_LUD16: ${{ vars.FUNDED_GUEST_SMOKE_MERCHANT_LUD16 }}
      FUNDED_GUEST_SMOKE_PRODUCT_ADDRESS: ${{ vars.FUNDED_GUEST_SMOKE_PRODUCT_ADDRESS }}
      FUNDED_GUEST_SMOKE_PROVIDER_HOST: ${{ vars.FUNDED_GUEST_SMOKE_PROVIDER_HOST }}
      FUNDED_GUEST_SMOKE_RECEIPT_RELAYS: ${{ vars.FUNDED_GUEST_SMOKE_RECEIPT_RELAYS }}
      FUNDED_GUEST_SMOKE_ANON_SHOPPER_PUBKEY: ${{ vars.FUNDED_GUEST_SMOKE_ANON_SHOPPER_PUBKEY }}
      FUNDED_GUEST_SMOKE_MAX_PAYMENT_SATS: ${{ vars.FUNDED_GUEST_SMOKE_MAX_PAYMENT_SATS }}
      FUNDED_GUEST_SMOKE_MERCHANT_NSEC: ${{ secrets.FUNDED_GUEST_SMOKE_MERCHANT_NSEC }}
      FUNDED_GUEST_SMOKE_PAYER_NWC_URI: ${{ secrets.FUNDED_GUEST_SMOKE_PAYER_NWC_URI }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Validate protected merchant and payer fixture
        run: bun run smoke:funded-guest-config

name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  VITE_RELAY_URL: "wss://relay.primal.net"
  VITE_DEFAULT_RELAYS: "wss://relay.primal.net,wss://relay.damus.io"

jobs:
  format:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Check formatting on changed files
        shell: bash
        run: |
          set -euo pipefail

          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            raw_base_sha='${{ github.event.pull_request.base.sha }}'
            head_sha='${{ github.event.pull_request.head.sha }}'
            base_sha="$(git merge-base "$raw_base_sha" "$head_sha" 2>/dev/null || true)"
          else
            base_sha='${{ github.event.before }}'
            head_sha='${{ github.sha }}'
          fi

          if [[ -z "$base_sha" || "$base_sha" == '0000000000000000000000000000000000000000' ]]; then
            base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || true)"
          fi

          if [[ -z "$base_sha" ]]; then
            echo "No base SHA available; skipping changed-file format check."
            exit 0
          fi

          bun scripts/ci/prettier_changed.ts --check --base "$base_sha" --head "$head_sha"

  lint:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun test

  color-policy:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Enforce no hardcoded colors outside theme.css
        run: bun test tests/no-hardcoded-colors.test.ts

  build-signet:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [format, lint, typecheck, test, color-policy]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Build (signet)
        run: VITE_LIGHTNING_NETWORK=signet bun run build

  build-mainnet:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [format, lint, typecheck, test, color-policy]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Build (mainnet)
        run: VITE_LIGHTNING_NETWORK=mainnet bun run build

  preview-links:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    needs: [build-signet]
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - name: Skip preview links for fork PRs
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "Preview link comments are skipped for fork PRs because GitHub provides a read-only token and Cloudflare Pages does not publish same-repository preview checks for fork heads."

      - name: Post preview links
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const headSha = context.payload.pull_request.head.sha;
            const shortSha = headSha.slice(0, 7);
            const prBody = context.payload.pull_request.body || "";
            const markerPattern = /<!--\s*preview:show-commit-links-cloudflare\s*-->\s*-\s*\[(x|X)\]/i;
            const preferredPattern = /-\s*\[(x|X)\]\s*Show commit preview links \(Cloudflare creates deployments automatically\)\b/i;
            const legacyPattern = /-\s*\[(x|X)\]\s*Deploy per-commit Cloudflare preview\b/;
            const commitPreviewEnabled = markerPattern.test(prBody) || preferredPattern.test(prBody) || legacyPattern.test(prBody);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const updatedAt = new Date().toISOString().replace("T", " ").replace(/\.\d{3}Z$/, " UTC");

            // Cloudflare branch slug: lowercase, non-alnum to dash, collapse, trim, max 28 chars
            const slug = branch
              .toLowerCase()
              .replace(/[^a-z0-9]/g, "-")
              .replace(/-+/g, "-")
              .replace(/^-|-$/g, "")
              .slice(0, 28);

            const PROJECTS = {
              market: {
                signetDomain: "conduit-market-signet",
                mainnetDomain: "conduit-market-coo",
                signetProject: "conduit-market-signet",
                mainnetProject: "conduit-market",
              },
              merchant: {
                signetDomain: "conduit-merchant-signet",
                mainnetDomain: "conduit-merchant-33n",
                signetProject: "conduit-merchant-signet",
                mainnetProject: "conduit-merchant",
              },
            };

            const CF_USERS = new Set([
              "cloudflare-workers-and-pages",
              "cloudflare-workers-and-pages[bot]",
              "cloudflare-pages[bot]",
            ]);

            function extractUrlsFromCommentBody(body) {
              let commitUrl = null;
              let branchUrl = null;

              for (const line of body.split("\n")) {
                const href = line.match(/href=['"]([^'"]+)['"]/i)?.[1] || null;
                const lower = line.toLowerCase();
                if (!href) continue;
                if (!branchUrl && lower.includes("branch preview url")) {
                  branchUrl = href;
                  continue;
                }
                if (!commitUrl && lower.includes("preview url") && !lower.includes("branch preview url")) {
                  commitUrl = href;
                }
              }

              return { commitUrl, branchUrl };
            }

            async function listIssueComments() {
              return github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });
            }

            function resolveProjectUrls(comments, projectName) {
              const candidates = comments
                .filter((comment) => {
                  const body = comment.body || "";
                  return (
                    CF_USERS.has(comment.user?.login || "")
                    && body.includes(`Deploying ${projectName}`)
                    && (
                      body.includes(`<code>${headSha}</code>`)
                      || body.includes(`<code>${shortSha}</code>`)
                      || body.includes(shortSha)
                    )
                  );
                })
                .reverse();

              for (const comment of candidates) {
                const parsed = extractUrlsFromCommentBody(comment.body || "");
                if (parsed.commitUrl || parsed.branchUrl) {
                  return parsed;
                }
              }

              return { commitUrl: null, branchUrl: null };
            }

            const byApp = {
              market: {
                signet: { commitUrl: null, branchUrl: null },
                mainnet: { commitUrl: null, branchUrl: null },
              },
              merchant: {
                signet: { commitUrl: null, branchUrl: null },
                mainnet: { commitUrl: null, branchUrl: null },
              },
            };

            const comments = await listIssueComments();

            for (const app of ["market", "merchant"]) {
              const project = PROJECTS[app];
              byApp[app].signet = resolveProjectUrls(comments, project.signetProject);
              byApp[app].mainnet = resolveProjectUrls(comments, project.mainnetProject);
            }

            core.info(
              commitPreviewEnabled
                ? "Posting preview links with available Cloudflare comment URLs; missing commit URLs remain pending."
                : "Posting deterministic branch preview URLs; commit preview links hidden by PR setting."
            );

            const rows = [];
            for (const app of ["market", "merchant"]) {
              const project = PROJECTS[app];
              const signet = byApp[app].signet;
              const mainnet = byApp[app].mainnet;

              rows.push({
                label: `${app.charAt(0).toUpperCase() + app.slice(1)} (signet)`,
                branchUrl: signet.branchUrl || `https://${slug}.${project.signetDomain}.pages.dev`,
                commitUrl: signet.commitUrl || null,
              });

              rows.push({
                label: `${app.charAt(0).toUpperCase() + app.slice(1)} (mainnet)`,
                branchUrl: mainnet.branchUrl || `https://${slug}.${project.mainnetDomain}.pages.dev`,
                commitUrl: mainnet.commitUrl,
              });
            }

            const branchTable = [
              "| App | URL |",
              "|-----|-----|",
              ...rows.map((row) => `| ${row.label} | ${row.branchUrl} |`),
            ].join("\n");

            const commitTable = [
              "| App | URL |",
              "|-----|-----|",
              ...rows.map((row) => `| ${row.label} | ${row.commitUrl || "_pending_"} |`),
            ].join("\n");
            const commitDetailsBlock = commitPreviewEnabled
              ? [
                  "<details>",
                  "<summary>Commit-Level URLs</summary>",
                  "",
                  commitTable,
                  "",
                  "</details>",
                ].join("\n")
              : "_Commit-level preview links are hidden by PR setting (`- [ ] Show commit preview links (Cloudflare creates deployments automatically)`)._";

            const MARKER_START = "<!-- conduit:preview_links -->";
            const MARKER_END = "<!-- /conduit:preview_links -->";
            const previewCommentBlock = [
              MARKER_START,
              "## Preview Deploys",
              "",
              `- Source commit: ${headSha}`,
              `- Last applied: ${updatedAt}`,
              `- Workflow run: ${runUrl}`,
              "",
              "### Branch URLs",
              "",
              branchTable,
              "",
              commitDetailsBlock,
              MARKER_END,
            ].join("\n");

            const commentBody = `${previewCommentBlock}\n\n_Preview links for latest commit ${shortSha}_`;

            const previewComments = comments
              .filter((comment) =>
                comment.user?.login === "github-actions[bot]"
                && comment.body?.includes(MARKER_START)
                && comment.body?.includes(MARKER_END)
              )
              .reverse();

            const [existingPreviewComment, ...stalePreviewComments] = previewComments;

            for (const staleComment of stalePreviewComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: staleComment.id,
              });
            }

            if (existingPreviewComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingPreviewComment.id,
                body: commentBody,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody,
            });

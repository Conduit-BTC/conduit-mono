name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]
  push:
    branches: [main]

env:
  VITE_RELAY_URL: "wss://relay.primal.net"
  VITE_DEFAULT_RELAYS: "wss://relay.primal.net,wss://relay.damus.io"

jobs:
  lint:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun test

  build-signet:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Build (signet)
        run: VITE_LIGHTNING_NETWORK=signet bun run build

  build-mainnet:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Build (mainnet)
        run: VITE_LIGHTNING_NETWORK=mainnet bun run build

  preview-links:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    needs: [build-signet]
    timeout-minutes: 15
    permissions:
      checks: read
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Upsert sticky preview comment as building
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || "";
            const markerPattern = /<!--\s*preview:show-commit-links-cloudflare\s*-->\s*-\s*\[(x|X)\]/i;
            const preferredPattern = /-\s*\[(x|X)\]\s*Show commit preview links \(Cloudflare creates deployments automatically\)\b/i;
            const legacyPattern = /-\s*\[(x|X)\]\s*Deploy per-commit Cloudflare preview\b/;
            const commitPreviewEnabled = markerPattern.test(prBody) || preferredPattern.test(prBody) || legacyPattern.test(prBody);

            const marker = "<!-- conduit:preview_links -->";
            const historyStart = "<!-- conduit-commit-preview-history:start -->";
            const historyEnd = "<!-- conduit-commit-preview-history:end -->";
            const updatedAt = new Intl.DateTimeFormat("en-US", {
              month: "short",
              day: "numeric",
              year: "numeric",
              hour: "numeric",
              minute: "2-digit",
              hour12: true,
              timeZone: "UTC",
            })
              .format(new Date())
              .replace(" AM", "am")
              .replace(" PM", "pm");
            const updatedAtCell = updatedAt.replace(/ /g, "&nbsp;");

            const actionText = commitPreviewEnabled ? "Preview pending, Commit pending" : "Preview pending, Comment (disabled)";
            const marketProject = "[market](https://dash.cloudflare.com/?to=/:account/pages/view/conduit-market)";
            const merchantProject = "[merchant](https://dash.cloudflare.com/?to=/:account/pages/view/conduit-merchant)";

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const historyRegex = new RegExp(
              `${escapeRegex(historyStart)}\\n([\\s\\S]*?)\\n${escapeRegex(historyEnd)}`
            );

            let historyItems = [];
            if (existing?.body) {
              const historyMatch = existing.body.match(historyRegex);
              if (historyMatch?.[1]) {
                historyItems = historyMatch[1]
                  .split("\n")
                  .map((line) => line.trim())
                  .filter((line) => line.startsWith("- "));
              }
            }

            const historyAccordion = historyItems.length
              ? [
                  "<details>",
                  `<summary>Commit previews (${historyItems.length})</summary>`,
                  "",
                  historyStart,
                  ...historyItems,
                  historyEnd,
                  "</details>",
                ].join("\n")
              : null;

            const body = [
              marker,
              "## Preview Deploys",
              "",
              "| Project | Deployment | Actions | Updated (UTC) |",
              "| :--- | :----- | :------ | :------ |",
              `| ${marketProject} | ![Building](https://vercel.com/static/status/building.svg) Building | ${actionText} | ${updatedAtCell} |`,
              `| ${merchantProject} | ![Building](https://vercel.com/static/status/building.svg) Building | ${actionText} | ${updatedAtCell} |`,
              historyAccordion ? "" : null,
              historyAccordion,
            ].filter(Boolean).join("\n");

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Post preview links
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const headSha = context.payload.pull_request.head.sha;
            const shortSha = headSha.slice(0, 7);
            const prBody = context.payload.pull_request.body || "";
            const markerPattern = /<!--\s*preview:show-commit-links-cloudflare\s*-->\s*-\s*\[(x|X)\]/i;
            const preferredPattern = /-\s*\[(x|X)\]\s*Show commit preview links \(Cloudflare creates deployments automatically\)\b/i;
            const legacyPattern = /-\s*\[(x|X)\]\s*Deploy per-commit Cloudflare preview\b/;
            const commitPreviewEnabled = markerPattern.test(prBody) || preferredPattern.test(prBody) || legacyPattern.test(prBody);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const updatedAt = new Date().toISOString().replace("T", " ").replace(/\.\d{3}Z$/, " UTC");
            const stateLabel = commitPreviewEnabled ? "enabled" : "disabled";

            // Cloudflare branch slug: lowercase, non-alnum to dash, collapse, trim, max 28 chars
            const slug = branch
              .toLowerCase()
              .replace(/[^a-z0-9]/g, "-")
              .replace(/-+/g, "-")
              .replace(/^-|-$/g, "")
              .slice(0, 28);

            const PROJECTS = {
              market: {
                signetDomain: "conduit-market-signet",
                mainnetDomain: "conduit-market-coo",
                signetProject: "conduit-market-signet",
                mainnetProject: "conduit-market",
              },
              merchant: {
                signetDomain: "conduit-merchant-signet",
                mainnetDomain: "conduit-merchant-33n",
                signetProject: "conduit-merchant-signet",
                mainnetProject: "conduit-merchant",
              },
            };

            const CF_USERS = new Set([
              "cloudflare-workers-and-pages",
              "cloudflare-workers-and-pages[bot]",
              "cloudflare-pages[bot]",
            ]);

            function extractUrlsFromCommentBody(body) {
              let commitUrl = null;
              let branchUrl = null;

              for (const line of body.split("\n")) {
                const href = line.match(/href=['"]([^'"]+)['"]/i)?.[1] || null;
                const lower = line.toLowerCase();
                if (!href) continue;
                if (!branchUrl && lower.includes("branch preview url")) {
                  branchUrl = href;
                  continue;
                }
                if (!commitUrl && lower.includes("preview url") && !lower.includes("branch preview url")) {
                  commitUrl = href;
                }
              }

              return { commitUrl, branchUrl };
            }

            async function listIssueComments() {
              return github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });
            }

            async function listCheckRuns() {
              const { data } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha,
                per_page: 100,
              });
              return data.check_runs || [];
            }

            function resolveProjectUrls(comments, projectName) {
              const candidates = comments
                .filter((comment) => {
                  const body = comment.body || "";
                  return (
                    CF_USERS.has(comment.user?.login || "")
                    && body.includes(`Deploying ${projectName}`)
                    && (
                      body.includes(`<code>${headSha}</code>`)
                      || body.includes(`<code>${shortSha}</code>`)
                      || body.includes(shortSha)
                    )
                  );
                })
                .reverse();

              for (const comment of candidates) {
                const parsed = extractUrlsFromCommentBody(comment.body || "");
                if (parsed.commitUrl || parsed.branchUrl) {
                  return parsed;
                }
              }

              return { commitUrl: null, branchUrl: null };
            }

            const byApp = {
              market: {
                signet: { commitUrl: null, branchUrl: null },
                mainnet: { commitUrl: null, branchUrl: null },
              },
              merchant: {
                signet: { commitUrl: null, branchUrl: null },
                mainnet: { commitUrl: null, branchUrl: null },
              },
            };

            let comments = [];
            const waitUntil = Date.now() + 10 * 60 * 1000;
            const pollIntervalMs = 20 * 1000;
            const expectedCfChecks = new Set([
              "Cloudflare Pages: conduit-market",
              "Cloudflare Pages: conduit-merchant",
              "Cloudflare Pages: conduit-market-signet",
              "Cloudflare Pages: conduit-merchant-signet",
            ]);

            while (true) {
              comments = await listIssueComments();

              for (const app of ["market", "merchant"]) {
                const project = PROJECTS[app];
                byApp[app].signet = resolveProjectUrls(comments, project.signetProject);
                byApp[app].mainnet = resolveProjectUrls(comments, project.mainnetProject);
              }

              const hasAllCommitUrls = ["market", "merchant"].every((app) =>
                Boolean(byApp[app].signet.commitUrl && byApp[app].mainnet.commitUrl)
              );
              const hasAllBranchUrls = ["market", "merchant"].every((app) =>
                Boolean(byApp[app].signet.branchUrl && byApp[app].mainnet.branchUrl)
              );

              const checkRuns = await listCheckRuns();
              const cloudflareRuns = checkRuns.filter((item) => expectedCfChecks.has(item.name));
              const cloudflareChecksCompleted = cloudflareRuns.length > 0
                && cloudflareRuns.every((item) => item.status === "completed");

              if ((commitPreviewEnabled && hasAllCommitUrls && hasAllBranchUrls) || (!commitPreviewEnabled && hasAllBranchUrls)) {
                core.info(
                  commitPreviewEnabled
                    ? "Found all Cloudflare commit and branch preview URLs."
                    : "Found all Cloudflare branch preview URLs (commit preview links hidden by PR setting)."
                );
                break;
              }

              if (cloudflareChecksCompleted) {
                core.info("All Cloudflare checks are completed; proceeding with available preview URLs.");
                break;
              }

              if (Date.now() >= waitUntil) {
                core.warning("Timed out waiting for complete Cloudflare preview links; using available URLs with fallbacks.");
                break;
              }

              const pending = [];
              for (const app of ["market", "merchant"]) {
                for (const network of ["signet", "mainnet"]) {
                  if (commitPreviewEnabled && !byApp[app][network].commitUrl) {
                    pending.push(`${app}/${network}:commit`);
                  }
                  if (!byApp[app][network].branchUrl) pending.push(`${app}/${network}:branch`);
                }
              }
              core.info(`Waiting for Cloudflare preview links/checks: ${pending.join(", ")}`);
              await new Promise((resolve) => setTimeout(resolve, pollIntervalMs));
            }

            const rows = [];
            for (const app of ["market", "merchant"]) {
              const project = PROJECTS[app];
              const signet = byApp[app].signet;
              const mainnet = byApp[app].mainnet;

              rows.push({
                label: `${app.charAt(0).toUpperCase() + app.slice(1)} (signet)`,
                branchUrl: signet.branchUrl || `https://${slug}.${project.signetDomain}.pages.dev`,
                commitUrl: signet.commitUrl || null,
              });

              rows.push({
                label: `${app.charAt(0).toUpperCase() + app.slice(1)} (mainnet)`,
                branchUrl: mainnet.branchUrl || `https://${slug}.${project.mainnetDomain}.pages.dev`,
                commitUrl: mainnet.commitUrl,
              });
            }

            const branchTable = [
              "| App | URL |",
              "|-----|-----|",
              ...rows.map((row) => `| ${row.label} | ${row.branchUrl} |`),
            ].join("\n");

            const MARKER_START = "<!-- conduit:preview_links -->";
            const MARKER_END = "<!-- /conduit:preview_links -->";
            const previewBodyBlock = [
              MARKER_START,
              "## Preview Deploys (Branch URLs)",
              "",
              `- Show commit preview links setting applied: **${stateLabel}**`,
              `- Last applied: ${updatedAt}`,
              `- Workflow run: ${runUrl}`,
              "",
              branchTable,
              MARKER_END,
            ].join("\n");

            // --- 1. Prepend to PR description (idempotent) ---
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const existing = pr.body || "";
            const markerRegex = new RegExp(
              `${MARKER_START.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}[\\s\\S]*?${MARKER_END.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}\\n*`
            );

            let newBody;
            if (markerRegex.test(existing)) {
              newBody = existing.replace(markerRegex, previewBodyBlock + "\n\n");
            } else {
              newBody = previewBodyBlock + "\n\n" + existing;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: newBody,
            });

            // --- 2. Sticky PR comment ---
            const commentMarker = MARKER_START;
            const historyStart = "<!-- conduit-commit-preview-history:start -->";
            const historyEnd = "<!-- conduit-commit-preview-history:end -->";
            const updatedAtCell = new Intl.DateTimeFormat("en-US", {
              month: "short",
              day: "numeric",
              year: "numeric",
              hour: "numeric",
              minute: "2-digit",
              hour12: true,
              timeZone: "UTC",
            })
              .format(new Date())
              .replace(" AM", "am")
              .replace(" PM", "pm")
              .replace(/ /g, "&nbsp;");

            const byAppRows = {
              market: {
                signet: byApp.market.signet,
                mainnet: byApp.market.mainnet,
                project: "[market](https://dash.cloudflare.com/?to=/:account/pages/view/conduit-market)",
              },
              merchant: {
                signet: byApp.merchant.signet,
                mainnet: byApp.merchant.mainnet,
                project: "[merchant](https://dash.cloudflare.com/?to=/:account/pages/view/conduit-merchant)",
              },
            };

            const allBranchReady = ["market", "merchant"].every((app) =>
              Boolean(byAppRows[app].signet.branchUrl && byAppRows[app].mainnet.branchUrl)
            );
            const allCommitReady = ["market", "merchant"].every((app) =>
              Boolean(byAppRows[app].signet.commitUrl && byAppRows[app].mainnet.commitUrl)
            );
            const deployReady = commitPreviewEnabled ? allBranchReady && allCommitReady : allBranchReady;

            const commentsForUpdate = comments;
            const existingSticky = commentsForUpdate.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(commentMarker)
            );

            const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const historyRegex = new RegExp(
              `${escapeRegex(historyStart)}\\n([\\s\\S]*?)\\n${escapeRegex(historyEnd)}`
            );

            let historyItems = [];
            if (existingSticky?.body) {
              const historyMatch = existingSticky.body.match(historyRegex);
              if (historyMatch?.[1]) {
                historyItems = historyMatch[1]
                  .split("\n")
                  .map((line) => line.trim())
                  .filter((line) => line.startsWith("- "));
              }
            }

            if (commitPreviewEnabled) {
              const commitLinks = [
                byAppRows.market.signet.commitUrl ? `[Market signet](${byAppRows.market.signet.commitUrl})` : null,
                byAppRows.market.mainnet.commitUrl ? `[Market mainnet](${byAppRows.market.mainnet.commitUrl})` : null,
                byAppRows.merchant.signet.commitUrl ? `[Merchant signet](${byAppRows.merchant.signet.commitUrl})` : null,
                byAppRows.merchant.mainnet.commitUrl ? `[Merchant mainnet](${byAppRows.merchant.mainnet.commitUrl})` : null,
              ].filter(Boolean);

              if (commitLinks.length) {
                const historyItem = `- \`${shortSha}\` · ${commitLinks.join(" · ")} · ${updatedAt}`;
                if (!historyItems.some((line) => line.includes(`\`${shortSha}\``))) {
                  historyItems.unshift(historyItem);
                }
              }
            }
            historyItems = historyItems.slice(0, 20);

            const historyAccordion = historyItems.length
              ? [
                  "<details>",
                  `<summary>Commit previews (${historyItems.length})</summary>`,
                  "",
                  historyStart,
                  ...historyItems,
                  historyEnd,
                  "</details>",
                ].join("\n")
              : null;

            const toDeploymentCell = (isReady, targetUrl) => {
              const label = isReady ? "Ready" : "Failed";
              const icon = isReady ? "ready.svg" : "failed.svg";
              return `![${label}](https://vercel.com/static/status/${icon}) [${label}](${targetUrl || runUrl})`;
            };

            const marketReady = commitPreviewEnabled
              ? Boolean(byAppRows.market.signet.branchUrl && byAppRows.market.mainnet.branchUrl && byAppRows.market.signet.commitUrl && byAppRows.market.mainnet.commitUrl)
              : Boolean(byAppRows.market.signet.branchUrl && byAppRows.market.mainnet.branchUrl);
            const merchantReady = commitPreviewEnabled
              ? Boolean(byAppRows.merchant.signet.branchUrl && byAppRows.merchant.mainnet.branchUrl && byAppRows.merchant.signet.commitUrl && byAppRows.merchant.mainnet.commitUrl)
              : Boolean(byAppRows.merchant.signet.branchUrl && byAppRows.merchant.mainnet.branchUrl);

            const marketActions = [
              byAppRows.market.signet.branchUrl ? `[Signet](${byAppRows.market.signet.branchUrl})` : "Signet unavailable",
              byAppRows.market.mainnet.branchUrl ? `[Mainnet](${byAppRows.market.mainnet.branchUrl})` : "Mainnet unavailable",
              commitPreviewEnabled ? null : "Comment (disabled)",
            ].filter(Boolean).join(", ");
            const merchantActions = [
              byAppRows.merchant.signet.branchUrl ? `[Signet](${byAppRows.merchant.signet.branchUrl})` : "Signet unavailable",
              byAppRows.merchant.mainnet.branchUrl ? `[Mainnet](${byAppRows.merchant.mainnet.branchUrl})` : "Mainnet unavailable",
              commitPreviewEnabled ? null : "Comment (disabled)",
            ].filter(Boolean).join(", ");

            const stickyCommentBody = [
              commentMarker,
              "## Preview Deploys",
              "",
              "| Project | Deployment | Actions | Updated (UTC) |",
              "| :--- | :----- | :------ | :------ |",
              `| ${byAppRows.market.project} | ${toDeploymentCell(marketReady, byAppRows.market.mainnet.branchUrl || byAppRows.market.signet.branchUrl)} | ${marketActions} | ${updatedAtCell} |`,
              `| ${byAppRows.merchant.project} | ${toDeploymentCell(merchantReady, byAppRows.merchant.mainnet.branchUrl || byAppRows.merchant.signet.branchUrl)} | ${merchantActions} | ${updatedAtCell} |`,
              historyAccordion ? "" : null,
              historyAccordion,
              deployReady ? null : "",
              deployReady ? null : `- Warning: Cloudflare preview URLs are incomplete for commit \`${shortSha}\`.`,
            ].filter(Boolean).join("\n");

            if (existingSticky) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingSticky.id,
                body: stickyCommentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: stickyCommentBody,
              });
            }

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  VITE_RELAY_URL: "wss://relay.primal.net"
  VITE_DEFAULT_RELAYS: "wss://relay.primal.net,wss://relay.damus.io"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun test

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    strategy:
      matrix:
        network: [signet, mainnet]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Build (${{ matrix.network }})
        run: VITE_LIGHTNING_NETWORK=${{ matrix.network }} bun run build
      - name: Stage build output
        run: |
          mkdir -p build-output/${{ matrix.network }}/market build-output/${{ matrix.network }}/merchant
          cp -r apps/market/dist/* build-output/${{ matrix.network }}/market/
          cp -r apps/merchant/dist/* build-output/${{ matrix.network }}/merchant/
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.network }}
          path: build-output/${{ matrix.network }}/
          retention-days: 7

  # Signet previews via wrangler (direct-upload projects).
  # Mainnet previews + production deploys are handled by CF git integration.
  deploy-signet:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        app: [market, merchant]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-signet
          path: build-output/signet/
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler pages deploy build-output/signet/${{ matrix.app }} \
            --project-name "conduit-${{ matrix.app }}-signet" \
            --branch "${{ github.head_ref }}" \
            --commit-hash "${{ github.sha }}"

  preview-links:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [deploy-signet]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Post preview links
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const headSha = context.payload.pull_request.head.sha;

            // Cloudflare branch slug: lowercase, non-alnum to dash, collapse, trim, max 28 chars
            const slug = branch
              .toLowerCase()
              .replace(/[^a-z0-9]/g, "-")
              .replace(/-+/g, "-")
              .replace(/^-|-$/g, "")
              .slice(0, 28);

            const DOMAIN_MAP = {
              "market-signet": "conduit-market-signet",
              "market-mainnet": "conduit-market-coo",
              "merchant-signet": "conduit-merchant-signet",
              "merchant-mainnet": "conduit-merchant-33n",
            };

            const links = Object.entries(DOMAIN_MAP).map(([key, domain]) => {
              const [app, network] = key.split("-");
              const label = `${app.charAt(0).toUpperCase() + app.slice(1)} (${network})`;
              const url = `https://${slug}.${domain}.pages.dev`;
              return `| ${label} | ${url} |`;
            });

            const table = [
              "| App | URL |",
              "|-----|-----|",
              ...links,
            ].join("\n");

            const MARKER_START = "<!-- conduit:preview_links -->";
            const MARKER_END = "<!-- /conduit:preview_links -->";
            const previewBlock = `${MARKER_START}\n## Preview Deploys\n\n${table}\n${MARKER_END}`;

            // --- 1. Prepend to PR description (idempotent) ---
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const existing = pr.body || "";
            const markerRegex = new RegExp(
              `${MARKER_START.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}[\\s\\S]*?${MARKER_END.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}\\n*`
            );

            let newBody;
            if (markerRegex.test(existing)) {
              newBody = existing.replace(markerRegex, previewBlock + "\n\n");
            } else {
              newBody = previewBlock + "\n\n" + existing;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: newBody,
            });

            // --- 2. Sticky comment (always visible in conversation) ---
            const commentBody = `${previewBlock}\n\n_Preview links for commit ${headSha.slice(0, 7)}_`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody,
            });

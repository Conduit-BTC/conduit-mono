name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Check formatting on changed files
        shell: bash
        run: |
          set -euo pipefail

          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            raw_base_sha='${{ github.event.pull_request.base.sha }}'
            head_sha='${{ github.event.pull_request.head.sha }}'
            base_sha="$(git merge-base "$raw_base_sha" "$head_sha" 2>/dev/null || true)"
          else
            base_sha='${{ github.event.before }}'
            head_sha='${{ github.sha }}'
          fi

          if [[ -z "$base_sha" || "$base_sha" == '0000000000000000000000000000000000000000' ]]; then
            base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || true)"
          fi

          if [[ -z "$base_sha" ]]; then
            echo "No base SHA available; skipping changed-file format check."
            exit 0
          fi

          bun scripts/ci/prettier_changed.ts --check --base "$base_sha" --head "$head_sha"

  lint:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun test

  color-policy:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Enforce no hardcoded colors outside theme.css
        run: bun test tests/no-hardcoded-colors.test.ts

  telemetry-policy:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Enforce privacy-safe telemetry policy
        run: bun run telemetry:check

  e2e-smoke:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        run: bun run test:e2e

  build-mainnet:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [format, lint, typecheck, test, color-policy, telemetry-policy]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Build (mainnet)
        run: VITE_LIGHTNING_NETWORK=mainnet bun run build

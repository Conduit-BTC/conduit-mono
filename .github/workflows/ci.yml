name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Check formatting on changed files
        shell: bash
        run: |
          set -euo pipefail

          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            raw_base_sha='${{ github.event.pull_request.base.sha }}'
            head_sha='${{ github.event.pull_request.head.sha }}'
            base_sha="$(git merge-base "$raw_base_sha" "$head_sha" 2>/dev/null || true)"
          else
            base_sha='${{ github.event.before }}'
            head_sha='${{ github.sha }}'
          fi

          if [[ -z "$base_sha" || "$base_sha" == '0000000000000000000000000000000000000000' ]]; then
            base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || true)"
          fi

          if [[ -z "$base_sha" ]]; then
            echo "No base SHA available; skipping changed-file format check."
            exit 0
          fi

          bun scripts/ci/prettier_changed.ts --check --base "$base_sha" --head "$head_sha"

  lint:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun test

  color-policy:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Enforce no hardcoded colors outside theme.css
        run: bun test tests/no-hardcoded-colors.test.ts

  telemetry-policy:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Enforce privacy-safe telemetry policy
        run: bun run telemetry:check

  smoke-changes:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      shards: ${{ steps.select.outputs.shards }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - name: Select affected smoke shards
        id: select
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RAW_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "push" ]]; then
            shards='["market","merchant"]'
          else
            base_sha="$(git merge-base "$RAW_BASE_SHA" "$HEAD_SHA")"
            shards="$(bun scripts/ci/select_smoke_shards.ts --base "$base_sha" --head "$HEAD_SHA")"
          fi

          echo "Selected smoke shards: $shards"
          echo "shards=$shards" >> "$GITHUB_OUTPUT"

  e2e-smoke-shard:
    name: e2e-smoke / ${{ matrix.area }}
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    needs: [smoke-changes]
    strategy:
      fail-fast: false
      matrix:
        area: ${{ fromJSON(needs.smoke-changes.outputs.shards) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: No browser smoke needed
        if: matrix.area == 'none'
        run: echo "No browser-facing runtime paths changed."
      - uses: actions/checkout@v7
        if: matrix.area != 'none'
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        if: matrix.area != 'none'
        with:
          bun-version: "1.3.5"
      - if: matrix.area != 'none'
        run: bun install --frozen-lockfile
      - name: Cache Playwright browsers
        if: matrix.area != 'none'
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright system dependencies
        if: matrix.area != 'none'
        run: bunx playwright install-deps chromium
      - name: Install Playwright browser
        if: matrix.area != 'none'
        run: bunx playwright install chromium
      - name: Run ${{ matrix.area }} Playwright smoke tests
        if: matrix.area != 'none'
        env:
          PLAYWRIGHT_SMOKE_AREA: ${{ matrix.area }}
        run: bunx playwright test --grep '${{ matrix.area }} '
      - name: Upload Playwright artifacts
        if: failure() && matrix.area != 'none'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-e2e-${{ matrix.area }}-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  e2e-smoke:
    name: e2e-smoke
    if: always() && (github.event_name != 'pull_request' || github.actor != 'github-actions[bot]')
    needs: [smoke-changes, e2e-smoke-shard]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify selected smoke shards
        env:
          SELECT_RESULT: ${{ needs.smoke-changes.result }}
          SHARD_RESULT: ${{ needs.e2e-smoke-shard.result }}
          SHARDS: ${{ needs.smoke-changes.outputs.shards }}
        run: |
          set -euo pipefail

          if [[ "$SELECT_RESULT" != "success" ]]; then
            echo "Smoke shard selection did not succeed: $SELECT_RESULT"
            exit 1
          fi
          if [[ "$SHARD_RESULT" != "success" ]]; then
            echo "Smoke shards did not complete successfully: $SHARD_RESULT"
            exit 1
          fi

          echo "Smoke shard result: $SHARD_RESULT for $SHARDS"

  build-mainnet:
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [format, lint, typecheck, test, color-policy, telemetry-policy]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Build (mainnet)
        run: VITE_LIGHTNING_NETWORK=mainnet bun run build

  preview-links:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    needs: [build-mainnet]
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Skip preview links for fork PRs
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "Preview link comments are skipped for fork PRs because GitHub provides a read-only token and Cloudflare Pages does not publish same-repository preview checks for fork heads."

      - name: Post mainnet preview links
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const headSha = context.payload.pull_request.head.sha;
            const shortSha = headSha.slice(0, 7);
            const prBody = context.payload.pull_request.body || "";
            const markerPattern = /<!--\s*preview:show-commit-links-cloudflare\s*-->\s*-\s*\[(x|X)\]/i;
            const preferredPattern = /-\s*\[(x|X)\]\s*Show commit-level mainnet preview links \(Cloudflare creates deployments automatically\)\b/i;
            const legacyPattern = /-\s*\[(x|X)\]\s*Show commit preview links \(Cloudflare creates deployments automatically\)\b/i;
            const commitPreviewEnabled = markerPattern.test(prBody) || preferredPattern.test(prBody) || legacyPattern.test(prBody);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const updatedAt = new Date().toISOString().replace("T", " ").replace(/\.\d{3}Z$/, " UTC");

            // Cloudflare branch slug: lowercase, non-alnum to dash, collapse, trim, max 28 chars
            const slug = branch
              .toLowerCase()
              .replace(/[^a-z0-9]/g, "-")
              .replace(/-+/g, "-")
              .replace(/^-|-$/g, "")
              .slice(0, 28);

            const PROJECTS = {
              market: {
                domain: "conduit-market-coo",
                project: "conduit-market",
              },
              merchant: {
                domain: "conduit-merchant-33n",
                project: "conduit-merchant",
              },
            };

            const CF_USERS = new Set([
              "cloudflare-workers-and-pages",
              "cloudflare-workers-and-pages[bot]",
              "cloudflare-pages[bot]",
            ]);

            function extractUrlsFromCommentBody(body) {
              let commitUrl = null;
              let branchUrl = null;

              for (const line of body.split("\n")) {
                const href = line.match(/href=['"]([^'"]+)['"]/i)?.[1] || null;
                const lower = line.toLowerCase();
                if (!href) continue;
                if (!branchUrl && lower.includes("branch preview url")) {
                  branchUrl = href;
                  continue;
                }
                if (!commitUrl && lower.includes("preview url") && !lower.includes("branch preview url")) {
                  commitUrl = href;
                }
              }

              return { commitUrl, branchUrl };
            }

            async function listIssueComments() {
              return github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });
            }

            function resolveProjectUrls(comments, projectName) {
              const candidates = comments
                .filter((comment) => {
                  const body = comment.body || "";
                  return (
                    CF_USERS.has(comment.user?.login || "")
                    && body.includes(`Deploying ${projectName}`)
                    && (
                      body.includes(`<code>${headSha}</code>`)
                      || body.includes(`<code>${shortSha}</code>`)
                      || body.includes(shortSha)
                    )
                  );
                })
                .reverse();

              for (const comment of candidates) {
                const parsed = extractUrlsFromCommentBody(comment.body || "");
                if (parsed.commitUrl || parsed.branchUrl) {
                  return parsed;
                }
              }

              return { commitUrl: null, branchUrl: null };
            }

            const comments = await listIssueComments();
            const rows = [];

            for (const app of ["market", "merchant"]) {
              const project = PROJECTS[app];
              const urls = resolveProjectUrls(comments, project.project);

              rows.push({
                label: app.charAt(0).toUpperCase() + app.slice(1),
                branchUrl: urls.branchUrl || `https://${slug}.${project.domain}.pages.dev`,
                commitUrl: urls.commitUrl || null,
              });
            }

            core.info(
              commitPreviewEnabled
                ? "Posting mainnet preview links with available Cloudflare comment URLs; missing commit URLs remain pending."
                : "Posting deterministic mainnet branch preview URLs; commit preview links hidden by PR setting."
            );

            const branchTable = [
              "| App | URL |",
              "|-----|-----|",
              ...rows.map((row) => `| ${row.label} | ${row.branchUrl} |`),
            ].join("\n");

            const commitTable = [
              "| App | URL |",
              "|-----|-----|",
              ...rows.map((row) => `| ${row.label} | ${row.commitUrl || "_pending_"} |`),
            ].join("\n");
            const commitDetailsBlock = commitPreviewEnabled
              ? [
                  "<details>",
                  "<summary>Commit-Level URLs</summary>",
                  "",
                  commitTable,
                  "",
                  "</details>",
                ].join("\n")
              : "_Commit-level preview links are hidden by PR setting (`- [ ] Show commit-level mainnet preview links (Cloudflare creates deployments automatically)`)._";

            const MARKER_START = "<!-- conduit:preview_links -->";
            const MARKER_END = "<!-- /conduit:preview_links -->";
            const previewCommentBlock = [
              MARKER_START,
              "## Preview Deploys",
              "",
              `- Source commit: ${headSha}`,
              `- Last applied: ${updatedAt}`,
              `- Workflow run: ${runUrl}`,
              "",
              "### Mainnet Branch URLs",
              "",
              branchTable,
              "",
              commitDetailsBlock,
              MARKER_END,
            ].join("\n");

            const commentBody = `${previewCommentBlock}\n\n_Mainnet preview links for latest commit ${shortSha}_`;

            const previewComments = comments
              .filter((comment) =>
                comment.user?.login === "github-actions[bot]"
                && comment.body?.includes(MARKER_START)
                && comment.body?.includes(MARKER_END)
              )
              .reverse();

            const [existingPreviewComment, ...stalePreviewComments] = previewComments;

            for (const staleComment of stalePreviewComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: staleComment.id,
              });
            }

            if (existingPreviewComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingPreviewComment.id,
                body: commentBody,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody,
            });

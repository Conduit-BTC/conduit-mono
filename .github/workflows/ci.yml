name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  VITE_RELAY_URL: "wss://relay.primal.net"
  VITE_DEFAULT_RELAYS: "wss://relay.primal.net,wss://relay.damus.io"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun test

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    strategy:
      matrix:
        network: [signet, mainnet]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Build (${{ matrix.network }})
        run: VITE_LIGHTNING_NETWORK=${{ matrix.network }} bun run build
      - name: Stage build output
        run: |
          mkdir -p build-output/${{ matrix.network }}/market build-output/${{ matrix.network }}/merchant
          cp -r apps/market/dist/* build-output/${{ matrix.network }}/market/
          cp -r apps/merchant/dist/* build-output/${{ matrix.network }}/merchant/
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.network }}
          path: build-output/${{ matrix.network }}/
          retention-days: 7

  # Signet previews via wrangler (direct-upload projects).
  # Mainnet previews + production deploys are handled by CF git integration.
  deploy-signet:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        app: [market, merchant]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-signet
          path: build-output/signet/
      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          deploy_log="$(mktemp)"
          npx --yes wrangler pages deploy build-output/signet/${{ matrix.app }} \
            --project-name "conduit-${{ matrix.app }}-signet" \
            --branch "${{ github.head_ref }}" \
            --commit-hash "${{ github.sha }}" 2>&1 | tee "$deploy_log"

          branch_slug="$(printf '%s' '${{ github.head_ref }}' \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g' \
            | cut -c1-28)"
          fallback_branch_url="https://${branch_slug}.conduit-${{ matrix.app }}-signet.pages.dev"

          commit_url="$(sed -n 's#.*Take a peek over at \(https://[^[:space:]]\+\).*#\1#p' "$deploy_log" | tail -n1)"
          branch_url="$(sed -n 's#.*Deployment alias URL: \(https://[^[:space:]]\+\).*#\1#p' "$deploy_log" | tail -n1)"

          if [ -z "${branch_url}" ]; then
            branch_url="$fallback_branch_url"
          fi

          {
            echo "commit_url=$commit_url"
            echo "branch_url=$branch_url"
          } >> "$GITHUB_OUTPUT"

          cat > "preview-${{ matrix.app }}.json" <<EOF
          {"app":"${{ matrix.app }}","network":"signet","branch_url":"${branch_url}","commit_url":"${commit_url}"}
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: preview-signet-${{ matrix.app }}
          path: preview-${{ matrix.app }}.json
          retention-days: 1

  preview-links:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [deploy-signet]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: preview-artifacts
          pattern: preview-signet-*
          merge-multiple: true
      - name: Post preview links
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");
            const branch = context.payload.pull_request.head.ref;
            const headSha = context.payload.pull_request.head.sha;
            const shortSha = headSha.slice(0, 7);

            // Cloudflare branch slug: lowercase, non-alnum to dash, collapse, trim, max 28 chars
            const slug = branch
              .toLowerCase()
              .replace(/[^a-z0-9]/g, "-")
              .replace(/-+/g, "-")
              .replace(/^-|-$/g, "")
              .slice(0, 28);

            const PROJECTS = {
              market: {
                signetDomain: "conduit-market-signet",
                mainnetDomain: "conduit-market-coo",
                mainnetProject: "conduit-market",
              },
              merchant: {
                signetDomain: "conduit-merchant-signet",
                mainnetDomain: "conduit-merchant-33n",
                mainnetProject: "conduit-merchant",
              },
            };

            const signetByApp = {};
            const previewDir = "preview-artifacts";
            if (fs.existsSync(previewDir)) {
              for (const fileName of fs.readdirSync(previewDir)) {
                if (!fileName.endsWith(".json")) continue;
                try {
                  const parsed = JSON.parse(fs.readFileSync(path.join(previewDir, fileName), "utf8"));
                  if (parsed?.app) signetByApp[parsed.app] = parsed;
                } catch {}
              }
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            function readMainnetUrls(projectName) {
              const candidates = comments
                .filter((comment) =>
                  comment.user?.login === "cloudflare-workers-and-pages"
                  && comment.body?.includes(`Deploying ${projectName}`)
                  && comment.body?.includes(`<code>${shortSha}</code>`)
                )
                .reverse();

              for (const comment of candidates) {
                const body = comment.body || "";
                const commitMatch = body.match(/Preview URL:[\s\S]*?<a href='([^']+)'/i);
                const branchMatch = body.match(/Branch Preview URL:[\s\S]*?<a href='([^']+)'/i);
                if (commitMatch?.[1] || branchMatch?.[1]) {
                  return {
                    commitUrl: commitMatch?.[1] || null,
                    branchUrl: branchMatch?.[1] || null,
                  };
                }
              }

              return { commitUrl: null, branchUrl: null };
            }

            const rows = [];
            for (const app of ["market", "merchant"]) {
              const project = PROJECTS[app];
              const signet = signetByApp[app] || {};
              const mainnet = readMainnetUrls(project.mainnetProject);

              rows.push({
                label: `${app.charAt(0).toUpperCase() + app.slice(1)} (signet)`,
                branchUrl: signet.branch_url || `https://${slug}.${project.signetDomain}.pages.dev`,
                commitUrl: signet.commit_url || null,
              });

              rows.push({
                label: `${app.charAt(0).toUpperCase() + app.slice(1)} (mainnet)`,
                branchUrl: mainnet.branchUrl || `https://${slug}.${project.mainnetDomain}.pages.dev`,
                commitUrl: mainnet.commitUrl,
              });
            }

            const branchTable = [
              "| App | URL |",
              "|-----|-----|",
              ...rows.map((row) => `| ${row.label} | ${row.branchUrl} |`),
            ].join("\n");

            const commitTable = [
              "| App | URL |",
              "|-----|-----|",
              ...rows.map((row) => `| ${row.label} | ${row.commitUrl || "_pending_"} |`),
            ].join("\n");

            const MARKER_START = "<!-- conduit:preview_links -->";
            const MARKER_END = "<!-- /conduit:preview_links -->";
            const previewBodyBlock = `${MARKER_START}\n## Preview Deploys (Branch URLs)\n\n${branchTable}\n${MARKER_END}`;
            const previewCommentBlock = [
              MARKER_START,
              "## Preview Deploys",
              "",
              "### Branch URLs",
              "",
              branchTable,
              "",
              "<details>",
              "<summary>Commit-Level URLs</summary>",
              "",
              commitTable,
              "",
              "</details>",
              MARKER_END,
            ].join("\n");

            // --- 1. Prepend to PR description (idempotent) ---
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const existing = pr.body || "";
            const markerRegex = new RegExp(
              `${MARKER_START.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}[\\s\\S]*?${MARKER_END.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}\\n*`
            );

            let newBody;
            if (markerRegex.test(existing)) {
              newBody = existing.replace(markerRegex, previewBodyBlock + "\n\n");
            } else {
              newBody = previewBodyBlock + "\n\n" + existing;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: newBody,
            });

            // --- 2. Per-commit comment (idempotent by commit SHA) ---
            const commentBody = `${previewCommentBlock}\n\n_Preview links for commit ${shortSha}_`;

            const alreadyPosted = comments.find((comment) =>
              comment.body?.includes(MARKER_START)
              && comment.body?.includes(`commit ${shortSha}`)
            );

            if (alreadyPosted) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody,
            });

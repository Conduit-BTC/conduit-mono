name: Anon Zap Provider Canary

on:
  workflow_dispatch:
    inputs:
      request_invoice:
        description: Request and validate an unpaid provider invoice
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: anon-zap-provider-canary
  cancel-in-progress: false

jobs:
  provider-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VITE_LIGHTNING_NETWORK: mainnet
      ANON_ZAP_CANARY_BASE_URL: ${{ vars.ANON_ZAP_CANARY_BASE_URL }}
      ANON_ZAP_CANARY_MERCHANT_PUBKEY: ${{ vars.ANON_ZAP_CANARY_MERCHANT_PUBKEY }}
      ANON_ZAP_CANARY_PRODUCT_ADDRESS: ${{ vars.ANON_ZAP_CANARY_PRODUCT_ADDRESS }}
      ANON_ZAP_CANARY_SIGNER_PUBKEY: ${{ vars.ANON_ZAP_CANARY_SIGNER_PUBKEY }}
      ANON_ZAP_CANARY_EXPECTED_LNURL: ${{ vars.ANON_ZAP_CANARY_EXPECTED_LNURL }}
      ANON_ZAP_CANARY_ATTESTATION_PUBLIC_KEYS: ${{ vars.ANON_ZAP_CANARY_ATTESTATION_PUBLIC_KEYS }}
      ANON_ZAP_PROVIDER_CANARY_LUD16: ${{ vars.ANON_ZAP_PROVIDER_CANARY_LUD16 }}
      ANON_ZAP_PROVIDER_CANARY_EXPECTED_HOST: ${{ vars.ANON_ZAP_PROVIDER_CANARY_EXPECTED_HOST }}
      ANON_ZAP_PROVIDER_CANARY_REQUEST_INVOICE: ${{ inputs.request_invoice }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Run provider invoice-readiness canary
        run: bun run smoke:anon-zap-provider

name: Dependency Security

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "30 16 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  bun-audit:
    name: Bun audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun ci
      # Current high advisory baseline is limited to transitive dev/build tooling.
      # Keep the ignores explicit so newly introduced high advisories still fail.
      - name: Run Bun audit high gate
        run: |
          bun audit --audit-level=high \
            --ignore=GHSA-3ppc-4f35-3m26 \
            --ignore=GHSA-7r86-cg39-jmmj \
            --ignore=GHSA-23c5-xmqv-rm74 \
            --ignore=GHSA-25h7-pfq9-p65f \
            --ignore=GHSA-rf6f-7fwh-wjgh \
            --ignore=GHSA-gv7w-rqvm-qjhr \
            --ignore=GHSA-c2c7-rcm5-vvqj

  osv-pr-scan:
    name: OSV PR scan
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write

  osv-full-scan:
    name: OSV full scan
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write

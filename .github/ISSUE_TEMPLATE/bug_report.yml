name: Bug report
description: Report a problem with Conduit Market, Merchant Portal, or Store Builder.
title: "[Bug]: "
labels:
  - bug
  - user-reported
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include private keys, seed phrases, passwords, NWC connection strings, payment credentials, full shipping addresses, phone numbers, or other sensitive personal information.

  - type: dropdown
    id: app
    attributes:
      label: App
      description: Which Conduit app were you using?
      options:
        - Conduit Market
        - Conduit Merchant Portal
        - Conduit Store Builder
        - Not sure
    validations:
      required: true

  - type: input
    id: route
    attributes:
      label: Route or page
      description: Paste the app route or URL path where the problem happened.
      placeholder: /products, /checkout, /orders

  - type: input
    id: version
    attributes:
      label: App version
      description: Prefilled by Conduit when available.
      placeholder: 0.0.1

  - type: input
    id: build
    attributes:
      label: Build or commit
      description: Prefilled by Conduit when available.
      placeholder: commit abc123 / branch main / channel preview

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug in plain language.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest steps that recreate the issue.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...

  - type: dropdown
    id: nostr-relay
    attributes:
      label: Nostr or relay involvement
      description: Did this seem related to relays, signer prompts, publishing, orders, or messages?
      options:
        - Not sure
        - Product/listing read
        - Product/listing publish
        - Order or message delivery
        - Signer connection or approval
        - Relay/network settings
        - Not related to Nostr/relays

  - type: textarea
    id: wallet-payment
    attributes:
      label: Wallet or payment context
      description: Optional. Include only non-sensitive context, such as wallet app name or whether this involved checkout/invoices/zaps.
      placeholder: Do not include NWC URIs, invoices with private context, payment credentials, seed phrases, or private keys.

  - type: textarea
    id: browser-device
    attributes:
      label: Browser or device
      description: Optional. Include browser/device details only if you choose to share them.
      placeholder: Desktop Chrome, Firefox, iOS Safari, Android browser, etc.

  - type: input
    id: contact
    attributes:
      label: Contact
      description: Optional. GitHub notifications work if you leave this blank.
      placeholder: npub, email, or other contact method

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include private keys, seed phrases, passwords, NWC connection strings, payment credentials, or sensitive personal information.
          required: true
        - label: Conduit maintainers may follow up in this GitHub issue.
          required: false

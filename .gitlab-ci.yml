image: oven/bun:1.3.5

stages:
  - review
  - lint
  - typecheck
  - test
  - build

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - apps/*/node_modules/
    - packages/*/node_modules/

variables:
  # Defaults for build-time env. Override in GitLab CI/CD variables as needed.
  VITE_RELAY_URL: "wss://relay.conduit.market"
  VITE_DEFAULT_RELAYS: ""
  VITE_LIGHTNING_NETWORK: "mainnet"

.bun_install:
  before_script:
    - bun --version
    - bun install --frozen-lockfile

lint:
  stage: lint
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  script:
    - bun run lint

typecheck:
  stage: typecheck
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  script:
    - bun run typecheck

test:
  stage: test
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  script:
    - bun test

build:
  stage: build
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  script:
    - bun run build
  artifacts:
    expire_in: 7 days
    paths:
      - apps/market/dist/
      - apps/merchant/dist/
      - apps/store-builder/dist/

codex_review:
  stage: review
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $CODEX_REVIEW_MR_IID'
      when: on_success
    - when: never
  script:
    - bun scripts/gitlab/codex_mr_review.ts
  allow_failure: true

codex_review_manual:
  stage: review
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - when: never
  script:
    - bun scripts/gitlab/codex_mr_review.ts
  allow_failure: true

pages_preview_market:
  stage: review
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never
  variables:
    CLOUDFLARE_PAGES_PROJECT: "conduit-market"
  environment:
    name: review/market/$CI_MERGE_REQUEST_IID
  script:
    - bun scripts/gitlab/cf_pages_set_env_url.ts
  allow_failure: true

pages_preview_merchant:
  stage: review
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never
  variables:
    # Workaround: Cloudflare Pages preview TLS provisioning was broken on the original merchant project.
    # The TLS-fixed project is now named `conduit-merchant` (subdomain `conduit-merchant-arq.pages.dev`).
    CLOUDFLARE_PAGES_PROJECT: "conduit-merchant"
  environment:
    name: review/merchant/$CI_MERGE_REQUEST_IID
  script:
    - bun scripts/gitlab/cf_pages_set_env_url.ts
  allow_failure: true

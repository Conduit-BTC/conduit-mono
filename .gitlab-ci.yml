image: oven/bun:1.3.5

stages:
  - lint
  - typecheck
  - test
  - build
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - apps/*/node_modules/
    - packages/*/node_modules/

variables:
  # Defaults for build-time env. Override in GitLab CI/CD variables as needed.
  VITE_RELAY_URL: "wss://relay.conduit.market"
  VITE_DEFAULT_RELAYS: ""
  VITE_LIGHTNING_NETWORK: "mainnet"

.bun_install:
  before_script:
    - bun --version
    - bun install --frozen-lockfile

lint:
  stage: lint
  extends: .bun_install
  script:
    - bun run lint

typecheck:
  stage: typecheck
  extends: .bun_install
  script:
    - bun run typecheck

test:
  stage: test
  extends: .bun_install
  script:
    - bun test

build:
  stage: build
  extends: .bun_install
  script:
    - bun run build
  artifacts:
    expire_in: 7 days
    paths:
      - apps/market/dist/
      - apps/merchant/dist/
      - apps/store-builder/dist/

.pages_deploy_template:
  stage: deploy
  extends: .bun_install
  needs: ["build"]
  rules:
    - if: $CI_COMMIT_BRANCH
  variables:
    # Wrangler looks for these names by default.
    CLOUDFLARE_API_TOKEN: $CLOUDFLARE_API_TOKEN
    CLOUDFLARE_ACCOUNT_ID: $CLOUDFLARE_ACCOUNT_ID
  script:
    - bunx wrangler --version
    - bunx wrangler pages deploy "$DIST_DIR" --project-name "$PAGES_PROJECT" --branch "$CI_COMMIT_REF_SLUG"

deploy:pages:market:
  extends: .pages_deploy_template
  variables:
    DIST_DIR: "apps/market/dist"
    PAGES_PROJECT: $CF_PAGES_MARKET_PROJECT

deploy:pages:merchant:
  extends: .pages_deploy_template
  variables:
    DIST_DIR: "apps/merchant/dist"
    PAGES_PROJECT: $CF_PAGES_MERCHANT_PROJECT

deploy:pages:store-builder:
  extends: .pages_deploy_template
  variables:
    DIST_DIR: "apps/store-builder/dist"
    PAGES_PROJECT: $CF_PAGES_STORE_BUILDER_PROJECT


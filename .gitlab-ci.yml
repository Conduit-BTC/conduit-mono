image: oven/bun:1.3.5

stages:
  - lint
  - typecheck
  - test
  - build
  - deploy
  - review

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - apps/*/node_modules/
    - packages/*/node_modules/

variables:
  VITE_RELAY_URL: "wss://relay.conduit.market"
  VITE_DEFAULT_RELAYS: ""

.bun_install:
  before_script:
    - bun --version
    - bun install --frozen-lockfile

lint:
  stage: lint
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  script:
    - bun run lint

typecheck:
  stage: typecheck
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  script:
    - bun run typecheck

test:
  stage: test
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  script:
    - bun test

build:
  stage: build
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  script:
    # Build signet variant
    - VITE_LIGHTNING_NETWORK=signet bun run build
    - mkdir -p build-output/signet/market build-output/signet/merchant
    - cp -r apps/market/dist/* build-output/signet/market/
    - cp -r apps/merchant/dist/* build-output/signet/merchant/
    # Build mainnet variant
    - VITE_LIGHTNING_NETWORK=mainnet bun run build
    - mkdir -p build-output/mainnet/market build-output/mainnet/merchant
    - cp -r apps/market/dist/* build-output/mainnet/market/
    - cp -r apps/merchant/dist/* build-output/mainnet/merchant/
  artifacts:
    expire_in: 7 days
    paths:
      - build-output/
      - apps/store-builder/dist/

deploy:
  stage: deploy
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never
  needs:
    - job: build
      artifacts: true
  parallel:
    matrix:
      - APP: [market, merchant]
        NETWORK: [signet, mainnet]
  environment:
    name: review/${APP}-${NETWORK}/${CI_MERGE_REQUEST_IID}
  script:
    - |
      if [ "$NETWORK" = "mainnet" ]; then
        PROJECT="conduit-${APP}"
      else
        PROJECT="conduit-${APP}-${NETWORK}"
      fi
    - echo "Deploying ${APP} (${NETWORK}) to ${PROJECT}..."
    - ls -la build-output/${NETWORK}/${APP}/ || echo "ERROR - dist directory missing"
    - bunx wrangler pages deploy build-output/${NETWORK}/${APP} --project-name "${PROJECT}" --branch "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" --commit-hash "$CI_COMMIT_SHA" 2>&1
  allow_failure: true

codex_review:
  stage: review
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $CODEX_REVIEW_MR_IID'
      when: on_success
    - when: never
  script:
    - bun scripts/gitlab/codex_mr_review.ts
  allow_failure: true

codex_review_manual:
  stage: review
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - when: never
  script:
    - bun scripts/gitlab/codex_mr_review.ts
  allow_failure: true

preview_links:
  stage: review
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never
  needs:
    - job: deploy
      artifacts: false
  script:
    - bun scripts/gitlab/post_preview_links.ts
  allow_failure: true

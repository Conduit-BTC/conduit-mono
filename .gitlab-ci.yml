image: oven/bun:1.3.5

stages:
  - lint
  - typecheck
  - test
  - build
  - deploy
  - review

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - apps/*/node_modules/
    - packages/*/node_modules/

variables:
  # Defaults for build-time env. Override in GitLab CI/CD variables as needed.
  VITE_RELAY_URL: "wss://relay.conduit.market"
  VITE_DEFAULT_RELAYS: ""
  VITE_LIGHTNING_NETWORK: "mainnet"

.bun_install:
  before_script:
    - bun --version
    - bun install --frozen-lockfile

lint:
  stage: lint
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  script:
    - bun run lint

typecheck:
  stage: typecheck
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  script:
    - bun run typecheck

test:
  stage: test
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  script:
    - bun test

build:
  stage: build
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  script:
    - bun run build
  artifacts:
    expire_in: 7 days
    paths:
      - apps/market/dist/
      - apps/merchant/dist/
      - apps/store-builder/dist/

deploy_market:
  stage: deploy
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never
  needs:
    - job: build
      artifacts: true
  environment:
    name: review/market/$CI_MERGE_REQUEST_IID
  script:
    - echo "Deploying market from apps/market/dist..."
    - ls -la apps/market/dist/ || echo "ERROR - dist directory missing"
    - ls apps/market/dist/ | head -10
    - bunx wrangler pages deploy apps/market/dist --project-name conduit-market --branch "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" --commit-hash "$CI_COMMIT_SHA" 2>&1
  allow_failure: true

deploy_merchant:
  stage: deploy
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never
  needs:
    - job: build
      artifacts: true
  environment:
    name: review/merchant/$CI_MERGE_REQUEST_IID
  script:
    - echo "Deploying merchant from apps/merchant/dist..."
    - ls -la apps/merchant/dist/ || echo "ERROR - dist directory missing"
    - ls apps/merchant/dist/ | head -10
    - bunx wrangler pages deploy apps/merchant/dist --project-name conduit-merchant --branch "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" --commit-hash "$CI_COMMIT_SHA" 2>&1
  allow_failure: true

codex_review:
  stage: review
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $CODEX_REVIEW_MR_IID'
      when: on_success
    - when: never
  script:
    - bun scripts/gitlab/codex_mr_review.ts
  allow_failure: true

codex_review_manual:
  stage: review
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - when: never
  script:
    - bun scripts/gitlab/codex_mr_review.ts
  allow_failure: true

preview_links:
  stage: review
  extends: .bun_install
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never
  script:
    - bun scripts/gitlab/post_preview_links.ts
  allow_failure: true

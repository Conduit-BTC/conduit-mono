image: oven/bun:1.3.5

stages:
  - lint
  - typecheck
  - test
  - build

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - apps/*/node_modules/
    - packages/*/node_modules/

variables:
  # Defaults for build-time env. Override in GitLab CI/CD variables as needed.
  VITE_RELAY_URL: "wss://relay.conduit.market"
  VITE_DEFAULT_RELAYS: ""
  VITE_LIGHTNING_NETWORK: "mainnet"

.bun_install:
  before_script:
    - bun --version
    - bun install --frozen-lockfile

lint:
  stage: lint
  extends: .bun_install
  script:
    - bun run lint

typecheck:
  stage: typecheck
  extends: .bun_install
  script:
    - bun run typecheck

test:
  stage: test
  extends: .bun_install
  script:
    - bun test

build:
  stage: build
  extends: .bun_install
  script:
    - bun run build
  artifacts:
    expire_in: 7 days
    paths:
      - apps/market/dist/
      - apps/merchant/dist/
      - apps/store-builder/dist/
